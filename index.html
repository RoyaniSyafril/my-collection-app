<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Collection App - Cloud</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Katalog Koleksi Digital (Cloud)</h1>
    </header>

    <section class="form-section">
        <div class="form-container">
            <h2>Tambah Koleksi Baru</h2>
            <form id="add-form">
                <input type="text" id="nama-barang" placeholder="Nama Barang (ex: Hot Wheels GT-R)" required>
                <input type="text" id="kategori-barang" placeholder="Kategori (ex: Diecast)" required>
                <input type="text" id="kondisi-barang" placeholder="Kondisi (ex: Mint/Loose)" required>
                <input type="number" id="harga-barang" placeholder="Harga Estimasi" required>
                <button type="submit" id="btn-simpan">Simpan ke Cloud</button>
            </form>
        </div>
    </section>

    <hr>

    <div class="search-section">
        <input type="text" id="search-input" placeholder="Cari berdasarkan nama, kategori, atau kondisi...">
        <div id="counter">Menampilkan 0 barang</div>
    </div>

    <main id="collection-container"></main>

    <script type="module" src="script.js"></script>
</body>
</html>
